<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หน้าเข้าสู่ระบบ</title>
<style>
  /* สไตล์ให้ดูสวยงาม */
  body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
  }
  .login-container {
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    font-size: 16px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #45a049;
  }
</style>
</head>
<body>

<div class="login-container" id="loginDiv">
  <h2>กรุณากรอกรหัสผ่าน</h2>
  <input type="password" id="passwordInput" placeholder="รหัสผ่าน" />
  <button onclick="checkPassword()">เข้าสู่ระบบ</button>
</div>

<div id="mainContent" style="display:none;">
  <h2>ยินดีต้อนรับ</h2>
  <button onclick="ดูดหัว()">ดูดหัว</button>
  <br/><br/>
  <label for="dpiRange">ปรับ DPI:</label>
  <input type="range" id="dpiRange" min="0" max="1000" value="500" oninput="updateDPIValue(this.value)">
  <span id="dpiValue">500</span>
</div>

<script>
function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if (input === '119') {
    document.getElementById('loginDiv').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } else {
    alert('รหัสผิด กรุณาลองใหม่');
  }
}

function ดูดหัว() {
  alert('ฟังก์ชันดูดหัวทำงานแล้ว!');
  // ใส่โค้ดสำหรับฟังก์ชันนี้ที่นี่
}

function updateDPIValue(val) {
  document.getElementById('dpiValue').innerText = val;
  // ใส่โค้ดสำหรับปรับ DPI ตามค่าที่เลือก
}
</script>

</body>
</html>
